<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login | Jav Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background shapes */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: -150px;
            right: -150px;
            animation: float 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            bottom: -200px;
            left: -200px;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, 20px) rotate(10deg); }
        }

        /* Login Container */
        .login-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 10;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Card */
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3);
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-icon i {
            font-size: 2.5rem;
            color: white;
        }

        .logo h1 {
            font-family: 'Rubik', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: #6b7280;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: #9ca3af;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 3rem;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
            color: #111827;
        }

        .input-field:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        .input-wrapper:focus-within .input-icon {
            color: #8b5cf6;
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #8b5cf6;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-family: 'Rubik', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* Error Message */
        .error-message {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-message i {
            color: #ef4444;
            font-size: 1.1rem;
        }

        .error-message span {
            color: #991b1b;
            font-size: 0.9rem;
            flex: 1;
        }

        .error-message.show {
            display: flex;
        }

        /* Additional Info */
        .info-text {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
            color: #9ca3af;
            font-size: 0.8rem;
        }

        /* Loading State */
        .login-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .login-btn.loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
            }

            .logo h1 {
                font-size: 1.5rem;
            }

            .input-field {
                padding: 0.8rem 1rem 0.8rem 3rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-film"></i>
                </div>
                <h1>Jav Gallery</h1>
                <p>Sign in to access premium content</p>
            </div>

            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid ID or password</span>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" class="input-field" id="userId" placeholder="User ID" autocomplete="off" value="">
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="input-field" id="password" placeholder="Password" autocomplete="off">
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Sign In</span>
                </button>
            </form>

            <div class="info-text">
                <i class="fas fa-shield-alt"></i> Demo Access • Secure Login
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const userIdInput = document.getElementById('userId');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const togglePasswordBtn = document.getElementById('togglePassword');

        // Credentials
        const VALID_ID = 'Minamo';
        const VALID_PASSWORD = '895';

        // Track if redirect is in progress to prevent multiple submissions
        let isSubmitting = false;

        // Toggle password visibility
        if (togglePasswordBtn) {
            togglePasswordBtn.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });
        }

        // Clear error when user starts typing
        function clearErrorOnInput() {
            errorMessage.classList.remove('show');
        }

        userIdInput.addEventListener('input', clearErrorOnInput);
        passwordInput.addEventListener('input', clearErrorOnInput);

        // Handle form submission
        async function handleLogin(event) {
            event.preventDefault();
            
            // Prevent multiple submissions
            if (isSubmitting) return;
            
            const userId = userIdInput.value.trim();
            const password = passwordInput.value.trim();
            
            // Basic validation
            if (!userId || !password) {
                showError('Please enter both ID and password');
                return;
            }
            
            // Show loading state
            isSubmitting = true;
            loginBtn.classList.add('loading');
            const originalBtnHtml = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="fas fa-spinner"></i><span>Verifying...</span>';
            
            // Simulate a tiny delay for better UX (shows loading state)
            setTimeout(() => {
                // Check credentials
                if (userId === VALID_ID && password === VALID_PASSWORD) {
                    // Successful login
                    showSuccessAndRedirect();
                } else {
                    // Failed login
                    showError('Invalid ID or password. Please try again.');
                    resetLoginButton(originalBtnHtml);
                    isSubmitting = false;
                    
                    // Shake animation on error
                    errorMessage.classList.add('show');
                    loginBtn.classList.remove('loading');
                    
                    // Clear password field for security
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            }, 400);
        }
        
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
            
            // Auto-hide error after 3 seconds
            setTimeout(() => {
                if (errorMessage.classList.contains('show')) {
                    errorMessage.classList.remove('show');
                }
            }, 3000);
        }
        
        function showSuccessAndRedirect() {
            // Change button to success state
            loginBtn.innerHTML = '<i class="fas fa-check-circle"></i><span>Success!</span>';
            loginBtn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
            
            // Store login state in sessionStorage (optional, can be used to remember login)
            sessionStorage.setItem('isLoggedIn', 'true');
            sessionStorage.setItem('loggedInUser', VALID_ID);
            
            // Redirect to main.html after a short delay
            setTimeout(() => {
                window.location.href = 'main.html';
            }, 600);
        }
        
        function resetLoginButton(originalHtml) {
            loginBtn.innerHTML = originalHtml;
            loginBtn.classList.remove('loading');
            loginBtn.style.background = '';
        }
        
        // Add enter key support
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !isSubmitting) {
                handleLogin(e);
            }
        });
        
        userIdInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !isSubmitting) {
                handleLogin(e);
            }
        });
        
        // Attach form submit handler
        loginForm.addEventListener('submit', handleLogin);
        
        // Focus on user ID field on page load
        userIdInput.focus();
        
        // Optional: Demo hint (can be removed in production)
        console.log('Demo credentials: ID = Minamo, Password = 895');
    </script>
</body>
</html>
